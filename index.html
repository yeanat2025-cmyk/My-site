<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Splash</title>
  <style>
    /* ===== Body & Splash Screen ===== */
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    .splash {
      text-align: center;
      animation: fadeIn 1.2s ease forwards;
    }

    .splash h1 {
      font-size: 8vw; /* responsive */
      color: #ff0050;
      margin: 0;
    }

    .splash p {
      font-size: 4vw; /* responsive */
      margin: 10px 0 0 0;
      color: #ffffffaa; /* slightly transparent */
    }

    /* ===== Animations ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.9); }
    }
  </style>
</head>
<body>

  <div class="splash">
    <h1>My Site</h1>
    <p>Product Sell</p>
  </div>

  <script>
    // ===== Splash Screen Delay =====
    const splash = document.querySelector('.splash');

    setTimeout(() => {
      // fade out animation
      splash.style.animation = 'fadeOut 0.8s forwards';
      // redirect after fade out completes
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 800);
    }, 3000); // 3 seconds display before fade out
  </script>

</body>
</html>
